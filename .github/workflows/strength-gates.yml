# Deterministic strength battery as parallel PR matrix jobs.
#
# REPORT-ONLY (vs-ai2.51): this workflow is NOT a required status check. Gates
# run node-budget searches (no wall clock), so runner speed cannot change the
# result — only wall-clock. Opening counts below are tuned so each job finishes
# well under ~10 min on a standard ubuntu-latest runner (measured locally, see
# the PR description). Individual gate failures do NOT fail the workflow; each
# job records PASS/FAIL into the summary comment instead. Promote to required
# once timings are proven across a few PRs.
name: Strength Gates (report-only)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    name: ${{ matrix.gate.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        gate:
          # order = numeric snippet prefix -> deterministic summary ordering
          - key: "1-strength"
            name: strength gate
            env: ""
            run: "^TestStrengthGate$"
          - key: "2-strangler"
            name: strangler (anti-strangulation)
            env: "VS_STRANGLER=1 VS_STRANGLER_OPENINGS=24"
            run: "^TestVsStrangler$"
          - key: "3-ladder"
            name: 1v1 ladder
            env: "VS_LADDER=1 VS_LADDER_OPENINGS=24"
            run: "^TestLadderReport$"
          - key: "4-empty-cut"
            name: from-empty + constructed cut
            env: "VS_EMPTY=1 VS_CONSTRUCTED_CUT=1"
            run: "^(TestFromEmptyOpeningGate|TestBotOpeningReplyInvariance|TestConstructedCutWidthSensitivity)$"
          - key: "5-exchange"
            name: exchange gates
            env: "VS_EXCHANGE=1"
            run: "^TestExchangeGate$"
          - key: "6-mp-ladder"
            name: multiplayer ladder
            env: "VS_MP_LADDER=1 VS_MP_LADDER_OPENINGS=3"
            run: "^TestMultiplayerLadderReport$"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run ${{ matrix.gate.name }}
        working-directory: ./backend
        run: |
          set +e
          env ${{ matrix.gate.env }} go test -v -timeout 20m -run '${{ matrix.gate.run }}' ./arena | tee raw.log
          code=${PIPESTATUS[0]}
          set -e
          {
            echo "### ${{ matrix.gate.name }}"
            echo
            if [ "$code" -eq 0 ]; then
              echo "Status: PASS"
            else
              echo "Status: FAIL (report-only — does not block this PR)"
            fi
            echo
            echo '```'
            # Keep only the tests' own log output (t.Logf lines + multi-line
            # table continuations); drop go test bookkeeping. Strip the
            # file:line prefix so tables read cleanly.
            grep -vE '^(=== |--- |PASS$|FAIL$|ok |FAIL |\? )' raw.log \
              | sed 's/^[[:space:]]*[a-z_]*_test\.go:[0-9]*: //'
            echo '```'
            echo
          } > "snippet-${{ matrix.gate.key }}.md"
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: strength-snippet-${{ matrix.gate.key }}
          path: backend/snippet-${{ matrix.gate.key }}.md
          if-no-files-found: error

  summary:
    name: strength summary comment
    needs: gate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: strength-snippet-*
          path: snippets
          merge-multiple: true

      - name: Assemble comment body
        run: |
          {
            echo "## Strength battery (report-only)"
            echo
            echo "Deterministic node-budget gates — win% + Wilson 95% CI + games played."
            echo "Not a required check. Failures below do not block merge."
            echo
            for f in $(ls snippets/snippet-*.md | sort); do
              cat "$f"
            done
            echo "_Generated by \`.github/workflows/strength-gates.yml\` for commit ${GITHUB_SHA}._"
          } > comment.md
          cat comment.md

      - name: Post/update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '## Strength battery (report-only)';
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const {data: comments} = await github.rest.issues.listComments({owner, repo, issue_number, per_page: 100});
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
