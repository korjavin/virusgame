# .github/workflows/deploy.yml
name: Deploy Application

on:
  push:
    branches:
      - main
      - 'canary/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the selected main-branch commit to production
        required: true
        type: boolean
        default: false
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        working-directory: ./backend
        run: go test -v -short ./...

      - name: Verify deployment event guard
        run: bash .github/scripts/verify-deploy-workflow.sh

  build-and-push:
    # Pull requests and ordinary manual runs are validation-only. A deployment
    # requires either a push to main or an explicit main-branch manual request.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true))
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Update and commit docker-compose.yml
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -B deploy
          # Anchor on a literal tag ([alnum] to end of line) so ${CANARY_IMAGE_TAG:-canary}
          # and other env-templated image tags are left untouched.
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:[a-zA-Z0-9]*$|image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}|g" docker-compose.yml
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:[a-zA-Z0-9]*$|image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}|g" bot-hoster-compose.yml

          git add docker-compose.yml bot-hoster-compose.yml
          git commit -m "ci: Update image tag to ${{ github.sha }}"
          git push origin deploy --force

      - name: Trigger Portainer Redeploy Webhook
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
          webhook_secret: "trigger"
          
      - name: Trigger Portainer Redeploy Webhook Bot
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK_BOT }}
          webhook_secret: "trigger"

  # Canary branches (canary/**) push a branch-tagged image only. It does NOT
  # touch the deploy branch or the production Portainer hooks; the canary
  # bot-hoster on the host pulls the moving `canary` tag. Promotion = merge to
  # main (the normal flow above). Rollback = stop the canary container.
  canary-build-and-push:
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/canary/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push canary Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:canary
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:canary-${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
